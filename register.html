<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
</head>
<body>

<h2>Form Đăng ký tài khoản</h2>

<form action="#" method="POST">

    <!-- FIELDSET 1 -->
    <fieldset>
        <legend>Thông tin cá nhân</legend>

        <label for="fullname">Họ tên:</label>
        <input type="text" id="fullname" name="fullname"
               required minlength="2" maxlength="50"
               placeholder="Nhập họ tên">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"
               required placeholder="example@gmail.com">
        <br><br>

        <label for="phone">Số điện thoại:</label>
        <input type="tel" id="phone" name="phone"
               pattern="[0-9]{10}"
               required placeholder="Nhập 10 chữ số">
        <br><br>

        <label for="dob">Ngày sinh:</label>
        <input type="date" id="dob" name="dob"
               max="2026-04-29"
               required placeholder="Chọn ngày sinh">
    </fieldset>

    <br>

    <!-- FIELDSET 2 -->
    <fieldset>
        <legend>Tài khoản</legend>

        <label for="username">Username:</label>
        <input type="text" id="username" name="username"
               pattern="[A-Za-z0-9_]{3,20}"
               required placeholder="3-20 ký tự, chữ/số/_">
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"
               minlength="8"
               pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
               required placeholder="Ít nhất 8 ký tự, có chữ hoa và số">
        <br><br>

        <label for="confirm">Xác nhận Password:</label>
        <input type="password" id="confirm" name="confirm"
               minlength="8"
               pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
               required placeholder="Nhập lại mật khẩu">
    </fieldset>

    <br>

    <!-- FIELDSET 3 -->
    <fieldset>
        <legend>Thông tin giao hàng</legend>

        <label for="city">Thành phố:</label>
        <select id="city" name="city" required>
            <option value="">--Chọn--</option>
            <option>Hà Nội</option>
            <option>TP.HCM</option>
            <option>Đà Nẵng</option>
            <option>Hải Phòng</option>
            <option>Cần Thơ</option>
        </select>
        <br><br>

        <label for="district">Quận/Huyện:</label>
        <select id="district" name="district" required>
            <option value="">--Chọn--</option>
            <option>Quận 1</option>
            <option>Quận 2</option>
            <option>Quận 3</option>
        </select>
        <br><br>

        <label for="address">Địa chỉ chi tiết:</label>
        <textarea id="address" name="address"
                  rows="3"
                  required
                  placeholder="Nhập địa chỉ cụ thể"></textarea>
        <br><br>

        <p>Giới tính:</p>
        <label>
            <input type="radio" name="gender" value="nam" required> Nam
        </label>
        <label>
            <input type="radio" name="gender" value="nu"> Nữ
        </label>
        <label>
            <input type="radio" name="gender" value="khac"> Khác
        </label>
    </fieldset>

    <br>

    <!-- Điều khoản -->
    <label>
        <input type="checkbox" name="terms" required>
        Tôi đồng ý điều khoản
    </label>

    <br><br>

    <!-- BUTTON -->
    <button type="submit">Đăng ký</button>
    <button type="reset">Nhập lại</button>

</form>

</body>
</html>
