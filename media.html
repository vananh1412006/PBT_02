<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia - Sản phẩm</title>
</head>
<body>

<h1>Giới thiệu sản phẩm</h1>

<!-- SVG LOGO -->
<h2>Logo cửa hàng</h2>
<svg width="120" height="120">
    <circle cx="60" cy="60" r="50" fill="blue" />
    <text x="30" y="70" fill="white" font-size="20">Shop</text>
</svg>

<hr>

<!-- ẢNH SẢN PHẨM -->
<h2>Sản phẩm nổi bật</h2>

<figure>
    <img src="https://placehold.co/300x200"
         alt="iPhone 16 màu đen, thiết kế sang trọng"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>iPhone 16 — Giá: 20.000.000đ</figcaption>
</figure>

<figure>
    <img src="https://placehold.co/300x200"
         alt="Laptop mỏng nhẹ, phù hợp làm việc văn phòng"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Laptop Pro — Giá: 18.500.000đ</figcaption>
</figure>

<figure>
    <img src="https://placehold.co/300x200"
         alt="Tai nghe không dây, âm thanh chất lượng cao"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Tai nghe Bluetooth — Giá: 1.200.000đ</figcaption>
</figure>

<hr>

<!-- VIDEO YOUTUBE -->
<h2>Video giới thiệu (YouTube)</h2>
<iframe width="560" height="315"
        src="https://youtu.be/42zqmxP94E0?si=4vmNeTxFTUfMoGLa"
        title="Video giới thiệu sản phẩm"
        frameborder="0"
        allowfullscreen>
</iframe>

<hr>

<!-- VIDEO HTML5 -->
<h2>Video sản phẩm</h2>
<video controls poster="https://placehold.co/600x300" width="600">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Trình duyệt không hỗ trợ video.
</video>

<hr>

<!-- AUDIO -->
<h2>Nhạc nền giới thiệu</h2>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Trình duyệt không hỗ trợ audio.
</audio>

</body>
</html>
